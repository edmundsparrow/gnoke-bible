<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Gnoke Bible</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <link rel="icon"             type="image/png" href="global.png" />
  <link rel="apple-touch-icon" href="global.png" />
  <link rel="manifest"         href="manifest.json" />

  <!-- Anti-FOUC: apply saved theme before first paint -->
  <script>
    (function(){
      var t = localStorage.getItem('gnoke_bible_theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:  #8b2a1f;
      --bg:      #fdf6f0;
      --text:    #1a0f0a;
      --muted:   #96726a;
      --surface: #ffffff;
      --border:  #e8d5cd;

      --font-sans:    'DM Sans', sans-serif;
      --font-mono:    'DM Mono', monospace;
      --font-display: 'Playfair Display', serif;
    }

    [data-theme="dark"] {
      --bg:      #130806;
      --text:    #f0e6e2;
      --muted:   #96726a;
      --surface: #1e0f0a;
      --border:  #3d1a14;
    }

    html, body {
      width: 100%; height: 100dvh;
      background: var(--bg); color: var(--text);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      transition: background .2s;
    }

    /* ── Ambient glow ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 65% 85%, rgba(139,42,31,0.10) 0%, transparent 58%),
        radial-gradient(ellipse at 20% 15%, rgba(139,42,31,0.06) 0%, transparent 48%);
    }

    /* ── Parchment texture dots ── */
    .bg-dots {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(139,42,31,0.06) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 72%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 72%);
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      width: 100%; height: 100dvh;
      display: flex; flex-direction: column;
      justify-content: space-between;
      padding: 48px 28px 40px;
    }

    /* ── Version stamp ── */
    .version {
      position: absolute; top: 50px; right: 28px;
      font-family: var(--font-mono);
      font-size: .62rem; letter-spacing: .08em; color: var(--muted);
      opacity: 0; animation: up .5s ease .05s forwards;
    }

    /* ── TOP: Brand ── */
    .top {
      display: flex; flex-direction: column; gap: 4px;
      opacity: 0; animation: up .5s ease .1s forwards;
    }
    .gnoke-label {
      font-family: var(--font-mono);
      font-size: .72rem; letter-spacing: .22em;
      text-transform: uppercase; color: var(--accent);
    }
    .app-name {
      font-family: var(--font-display);
      font-size: 2.6rem; font-weight: 700;
      letter-spacing: -.03em; line-height: 1; color: var(--text);
    }

    /* ── MID: Description + Pillars ── */
    .mid {
      display: flex; flex-direction: column; gap: 28px;
      opacity: 0; animation: up .5s ease .25s forwards;
    }
    .desc {
      font-size: 1rem; font-weight: 300;
      color: var(--muted); line-height: 1.65; max-width: 320px;
    }
    .desc strong { color: var(--text); font-weight: 600; }

    .pillars { display: flex; gap: 8px; }
    .pillar {
      flex: 1; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 10px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .pillar-icon  { font-size: 1.1rem; line-height: 1; }
    .pillar-label {
      font-family: var(--font-mono);
      font-size: .6rem; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted);
    }

    /* ── BOTTOM: CTA + Skip row ── */
    .bottom {
      display: flex; flex-direction: column; gap: 14px;
      opacity: 0; animation: up .5s ease .4s forwards;
    }
    .enter-btn {
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      width: 100%; padding: 16px;
      background: var(--accent); color: #fff;
      font-family: var(--font-sans);
      font-size: .92rem; font-weight: 600;
      border: none; border-radius: 10px;
      cursor: pointer; text-decoration: none;
      transition: opacity .15s, transform .15s;
      box-shadow: 0 4px 20px rgba(139,42,31,.30);
    }
    .enter-btn:active { opacity: .88; transform: scale(.98); }
    .arrow { transition: transform .2s; display: inline-block; }
    .enter-btn:hover .arrow { transform: translateX(4px); }

    .skip-row {
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
    }
    .skip-row input {
      width: 15px; height: 15px;
      accent-color: var(--accent); cursor: pointer;
    }
    .skip-row label {
      font-family: var(--font-mono);
      font-size: .62rem; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted);
      cursor: pointer; user-select: none;
    }

    /* ── Animations ── */
    body.out { animation: fadeOut .28s ease forwards; }
    @keyframes fadeOut { to { opacity: 0; } }
    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-dots"></div>
<span class="version">v1.0</span>

<div class="page">

  <div class="top">
    <span class="gnoke-label">Gnoke</span>
    <span class="app-name">Bible</span>
  </div>

  <div class="mid">
    <p class="desc">
      The complete King James Version — searchable, bookmarkable, offline.
      Built for <strong>readers, students, and devotional use.</strong>
      No server. No account.
    </p>
    <div class="pillars">
      <div class="pillar">
        <span class="pillar-icon">📖</span>
        <span class="pillar-label">66 Books</span>
      </div>
      <div class="pillar">
        <span class="pillar-icon">🔍</span>
        <span class="pillar-label">Full Search</span>
      </div>
      <div class="pillar">
        <span class="pillar-icon">🔒</span>
        <span class="pillar-label">Offline</span>
      </div>
    </div>
  </div>

  <div class="bottom">
    <!--
      Always links to the specific first HTML file — not just "main/".
      Template 2 is an MPA: folder-only links break on most static servers.
    -->
    <a class="enter-btn" href="main/read.html" onclick="go(event)">
      Open Gnoke Bible <span class="arrow">→</span>
    </a>
    <div class="skip-row">
      <input type="checkbox" id="skip" />
      <label for="skip">Don't show again</label>
    </div>
  </div>

</div>

<script>
  const KEY = 'gnoke_bible_skip_intro';

  if (localStorage.getItem(KEY) === '1') {
    window.location.replace('main/read.html');
  }

  function go(e) {
    e.preventDefault();
    if (document.getElementById('skip').checked) {
      localStorage.setItem(KEY, '1');
    }
    document.body.classList.add('out');
    setTimeout(() => { window.location.href = 'main/read.html'; }, 280);
  }
</script>
</body>
</html>
